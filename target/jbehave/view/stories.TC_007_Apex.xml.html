<step outcome="successful">And [Input] Select &apos;p:SaudiRiyals&apos; value from &apos;QutCrCdCombobox&apos; dropdown list</step>
<step outcome="successful">And [Navigation] I scroll to &apos;CreateButton&apos;</step>
<step outcome="successful">And [Input] I click on &apos;CreateButton&apos;</step>
<step outcome="successful">And [Progress] I wait for &apos;5&apos; sec</step>
<step outcome="successful">And [Navigation] I scroll to &apos;SuccessfullyAlert&apos;</step>
<step outcome="successful">And [Assertion] Verify &apos;SuccessfullyAlert&apos; contains &apos;p:DataSavedSuccessfully&apos; text</step>

<step outcome="successful">And [Progress] I wait for &apos;5&apos; sec</step>
<step outcome="successful">And [Input] I set IG &apos;calc_ig&apos; from first row &apos;20 - LC invoice value&apos; to random numbers between &apos;1&apos; and &apos;50&apos; for all enabled cells excluding DDL</step>
